<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nimbasia Stabilizers</title>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, proxy-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/pwa-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/pwa-icon.svg" />
    <style>
      #root {
        min-height: 100vh;
      }

      .boot-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        color: #0f172a;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      .boot-screen-card {
        max-width: 420px;
        width: 100%;
        background: #ffffff;
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
      }

      .boot-screen-title {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

      .boot-screen-copy {
        margin: 12px 0 0;
        color: #475569;
        line-height: 1.6;
      }
    </style>
    <script>
      (function () {
        try {
          var isLocalhost =
            window.location.hostname === "localhost" ||
            window.location.hostname === "127.0.0.1";
          var cleanupVersion = "2026-05-01";
          var cleanupKey = "nimbasia_cleanup_version";

          if (!isLocalhost) {
            var originalFetch = window.fetch ? window.fetch.bind(window) : null;
            var originalOpen = window.XMLHttpRequest && window.XMLHttpRequest.prototype.open;

            function rewriteLocalhostUrl(input) {
              try {
                var rawUrl = typeof input === "string" ? input : input && input.url;
                if (!rawUrl) return input;

                var parsedUrl = new URL(rawUrl, window.location.origin);
                if (
                  (parsedUrl.hostname === "localhost" || parsedUrl.hostname === "127.0.0.1") &&
                  parsedUrl.port === "5174"
                ) {
                  parsedUrl.protocol = window.location.protocol;
                  parsedUrl.host = window.location.host;
                  return typeof input === "string" ? parsedUrl.toString() : new Request(parsedUrl.toString(), input);
                }
              } catch (error) {
                // Ignore URL parsing failures and keep the original request untouched.
              }

              return input;
            }

            if (originalFetch) {
              window.fetch = function (input, init) {
                return originalFetch(rewriteLocalhostUrl(input), init);
              };
            }

            if (originalOpen) {
              window.XMLHttpRequest.prototype.open = function (method, url) {
                return originalOpen.apply(this, [method, rewriteLocalhostUrl(url)].concat([].slice.call(arguments, 2)));
              };
            }
          }

          var shouldRunCleanup = true;
          try {
            shouldRunCleanup = window.localStorage.getItem(cleanupKey) !== cleanupVersion;
          } catch (storageError) {
            shouldRunCleanup = true;
          }

          if (shouldRunCleanup && "serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (registrations) {
              return Promise.all(
                registrations.map(function (registration) {
                  return registration.unregister();
                })
              );
            }).catch(function () {});
          }

          if (shouldRunCleanup && "caches" in window) {
            caches.keys().then(function (keys) {
              return Promise.all(
                keys.map(function (key) {
                  return caches.delete(key);
                })
              );
            }).catch(function () {});
          }

          if (shouldRunCleanup) {
            try {
              window.localStorage.setItem(cleanupKey, cleanupVersion);
            } catch (storageError) {
              // Ignore storage failures and keep booting.
            }
          }
        } catch (error) {
          // Ignore cleanup errors and continue booting the app.
        }
      })();
    </script>
  </head>
  <body class="bg-slate-100">
    <div id="root">
      <div class="boot-screen">
        <div class="boot-screen-card">
          <h1 class="boot-screen-title">Loading Nimbasia</h1>
          <p class="boot-screen-copy">
            If this screen stays here, refresh once to clear an old mobile cache.
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
